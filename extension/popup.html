<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ED Content Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 240px;
      background: #fff;
      color: #1c1917;
    }

    .header {
      background: #1c1917;
      color: #fff;
      padding: 12px 14px;
    }
    .header h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
    .header p  { font-size: 11px; color: #a8a29e; margin-top: 2px; }

    .counts {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #e7e5e4;
    }
    .count-box {
      flex: 1;
      padding: 14px 10px;
      text-align: center;
      border-right: 1px solid #e7e5e4;
    }
    .count-box:last-child { border-right: none; }
    .count-box .number {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      display: block;
    }
    .count-box .label {
      font-size: 11px;
      color: #78716c;
      margin-top: 4px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .warn   .number { color: #d97706; }
    .harmful .number { color: #dc2626; }

    .status {
      padding: 10px 14px;
      font-size: 11px;
      color: #78716c;
      text-align: center;
      min-height: 32px;
    }
    .status.error { color: #dc2626; }

    .footer {
      padding: 8px 14px;
      background: #f5f5f4;
      font-size: 10px;
      color: #a8a29e;
      text-align: center;
      border-top: 1px solid #e7e5e4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ED Content Detector</h1>
    <p>Flagged items on this page</p>
  </div>

  <div class="counts">
    <div class="count-box warn">
      <span class="number" id="warn-count">–</span>
      <span class="label">Warnings</span>
    </div>
    <div class="count-box harmful">
      <span class="number" id="harmful-count">–</span>
      <span class="label">Harmful</span>
    </div>
  </div>

  <p class="status" id="status">Loading…</p>

  <div class="footer">Scanning every 3 s · localhost:8000</div>

  <script src="popup.js"></script>
</body>
</html>
